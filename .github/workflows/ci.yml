name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: llama-cpp-config (clippy + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: llama-cpp-config

      - name: Clippy (deny warnings)
        working-directory: llama-cpp-config
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        working-directory: llama-cpp-config
        run: cargo test

  powershell:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          # Write-Host is intentional in these scripts (colored interactive output).
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning, Error -ExcludeRule PSAvoidUsingWriteHost
          if ($findings) {
            $findings | Format-Table -AutoSize | Out-String | Write-Output
            exit 1
          }
          Write-Output "No PSScriptAnalyzer findings."
